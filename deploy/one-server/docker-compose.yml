name: dog-breed-identifier

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_connections=120
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - work_mem=4MB
      - -c
      - wal_buffers=16MB
      - -c
      - max_wal_size=1GB
      - -c
      - log_min_duration_statement=750
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER:-dogdiet}" -d "$${POSTGRES_DB:-dogdiet}"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    init: true
    mem_limit: 1024m
    cpus: "1.00"
    pids_limit: 300
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    env_file:
      - .env.api
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    init: true
    mem_limit: 900m
    cpus: "0.90"
    pids_limit: 250
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    env_file:
      - .env.web
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    init: true
    mem_limit: 900m
    cpus: "0.90"
    pids_limit: 250
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://127.0.0.1/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    init: true
    mem_limit: 160m
    cpus: "0.30"
    pids_limit: 150
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
