name: Deploy to GCP VM

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "deploy/one-server/**"
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - ".github/workflows/deploy-api.yml"

jobs:
  verify:
    name: Verify before deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file exists
        run: test -f deploy/one-server/docker-compose.yml

  deploy:
    name: Deploy to dog-breed-identifier
    runs-on: ubuntu-latest
    needs: [verify]
    concurrency:
      group: deploy-gcp-vm
      cancel-in-progress: false

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/opt/dog-breed-identifier"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p /opt
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git checkout main
            git pull --ff-only origin main

            cd deploy/one-server

            for required in .env.api .env.web .env.postgres; do
              if [ ! -f "$required" ]; then
                echo "Missing required file: deploy/one-server/$required"
                exit 1
              fi
            done

            docker compose up -d --build --remove-orphans
            docker image prune -f

