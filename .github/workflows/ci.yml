name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api-validate:
    name: API — Type Check, Test & Docker Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/testdb
      SECRET_KEY: ci-secret-key-not-for-production
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Docker build (API)
        run: docker build -t dog-diet-api:ci .

      - name: Docker runtime smoke test (API)
        run: |
          set -euo pipefail
          docker run -d --name api-smoke -p 18000:8000 \
            -e ENVIRONMENT=test \
            -e DATABASE_URL=postgresql+asyncpg://test:test@127.0.0.1:5432/testdb \
            -e SECRET_KEY=ci-secret-key-not-for-production \
            dog-diet-api:ci \
            uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --log-level warning --no-access-log

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:18000/health >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:18000/health
          docker rm -f api-smoke

  web-build-verify:
    name: Web — Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Docker build (Web)
        run: docker build -t dog-diet-web:ci .
